name: Send Webhook on Push to Main

on:
  push:
    branches:
      - main

jobs:
  send-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Send form POST to webhook and show response
        run: |
          echo "Sending webhook to ${{ secrets.MXWEBHOOKURL }}"

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST ${{ secrets.MXWEBHOOKURL }} \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "mxRepoName=${{ vars.mxRepoPath }}" \
            --data-urlencode "mxRepoSite=${{ vars.mxSitePath }}" \
            --data-urlencode "mxbranchName=${{ vars.mxbranchName }}")

          echo "Webhook Response:"
          echo "$RESPONSE"
